# DPDPA-aligned log retention for MathWise / Dr. Math nursing traffic.
# Installed to /etc/logrotate.d/drmath by scripts/deploy.sh.
/var/log/nginx/drmath-*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        nginx -s reload >/dev/null 2>&1 || true
    endscript
}
