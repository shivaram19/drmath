org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Workaround for AGP 8.2 Jetifier failing on Bouncy Castle jars compiled with Java 21.
# See ADR-021. Safe because BC jars contain no legacy Android Support Library classes.
android.jetifier.ignorelist=.*bcprov.*,.*bcutil.*
