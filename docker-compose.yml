version: "3.8"

services:
  drmath:
    build: .
    container_name: drmath-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: drmath-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/static:/usr/share/nginx/html/static:ro
    depends_on:
      - drmath
    restart: unless-stopped
