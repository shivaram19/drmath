# HTTP-only config — used BEFORE SSL certificates exist
# After running scripts/init-ssl.sh, this is replaced by nginx.ssl.conf

server {
    listen 80;
    server_name drmath.trelolabs.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # PWA landing page for nursing module
    location = /nursing {
        return 301 /nursing/;
    }

    location /nursing/ {
        alias /usr/share/nginx/html/nursing/;
        expires 7d;
        try_files $uri $uri/ /nursing/index.html;
    }

    # Direct-download APK artifacts
    location /mathwise.apk {
        alias /usr/share/nginx/html/mathwise.apk;
        add_header Content-Disposition "attachment; filename=mathwise.apk";
    }

    location /voter-survey.apk {
        alias /usr/share/nginx/html/voter-survey.apk;
        add_header Content-Disposition "attachment; filename=voter-survey.apk";
    }

    # Static files served directly by nginx
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
    }

    # Proxy everything else to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect www to non-www
server {
    listen 80;
    server_name www.drmath.trelolabs.com;
    return 301 http://drmath.trelolabs.com$request_uri;
}
